# CBZ Viewer - Kind グループ定義
#
# 優先度:
# 1. [overrides] のファイル個別設定
# 2. [[kind_rules]] の Kind 正規表現
# 3. ファイル名先頭の Kind 文字列そのもの
# 4. どれにも当たらない場合は未分類
#
# [groups] は優先順位ではなく、絞り込みと集計のための親子関係です。
# child には、overrides / kind_rules / groups で定義済みのグループ名を指定してください。

[overrides]
# パスはアプリが正規化した完全一致で照合します。
# GUIからの設定もここに自動書き込みされます。
# "C:\\path\\to\\file.zip" = "グループ名"

# ファイル名の先頭にある Kind に対して正規表現で一致します。
# 上から順に評価し、最初に一致したものが使われます。
# [[kind_rules]]
# pattern = "^C\\d+$"
# group = "イベントA"

# グループ階層定義（省略可・上級者向け）
# child は定義済みグループ名にしてください。
# [groups."カテゴリA"]
# children = ["イベントA"]
